<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">
  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 0;
}
    .form-container {
    background: rgba(255,255,255,0.95);
    padding: 25px 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.35);
    width: 350px;
    max-width: 90%;
}
    h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #222;
  font-size: 30px;
  font-weight: bold;
}
   input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
}
    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #3cb371;
      color: white;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }
    .link {
    text-align: center;
    margin-top: 15px;
    color: #222;
    font-size: 15px;
}

.link a {
    color: #3cb371;
    text-decoration: none;
    font-weight: bold;
}

.link a:hover {
    color: #2e8b57;
    text-decoration: underline;
}
    .alert {
    display: none;
    background: #dc3545;
    color: #fff;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 15px;
    text-align: center;
    font-weight: bold;
    border-left: 6px solid #8b0000;
    box-shadow: 0 4px 12px rgba(220,53,69,0.35);
    animation: slideDown 0.4s ease;
}
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-15px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Sign Up</h2>
    <div id="alertBox" class="alert" style="display:none;"></div>

    <form action="signup.php" method="POST">
      <input type="text" name="fullname" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required
  pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z]+\.(com|in|org|net)$"
  title="Please enter a realistic email like user@example.com">
      <input type="text" name="department" placeholder="Department" required>
      <input type="text" name="roll" placeholder="Roll Number" required>
      <input type="text" name="semester" placeholder="Semester" required>
      <input type="text" name="phone" placeholder="Phone Number" required
        pattern="[6-9][0-9]{9}" maxlength="10"
        title="Enter a valid 10-digit Indian mobile number starting with 6-9">
      <input type="password" name="password" placeholder="Password" required
        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
        title="Must include upper, lower, number, special char & 8+ characters">
      <input type="password" name="confirm_password" placeholder="Confirm Password" required>
      <button type="submit">Submit</button>
    </form>
    <div class="link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
<script>
  const form = document.querySelector("form");
  form.addEventListener("submit", function (e) {
    const inputs = form.querySelectorAll("input[required]");
    let allFilled = true;

    inputs.forEach(input => {
      if (!input.value.trim()) {
        allFilled = false;
        input.style.border = "2px solid red";
      } else {
        input.style.border = ""; // reset
      }
    });

    if (!allFilled) {
      e.preventDefault();
      alert("⚠️ Please fill in all required fields before submitting.");
    }
  });
</script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = decodeURIComponent(error.replace(/\+/g, ' '));
      alertBox.style.display = 'block';
    }
  </script>
</body>
</html>
